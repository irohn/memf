name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            cc: cc
            install_deps: false
            run_version: true
          - arch: arm64
            cc: aarch64-linux-gnu-gcc
            install_deps: true
            run_version: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install cross compiler
        if: matrix.install_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build memf
        run: make clean all CC=${{ matrix.cc }}

      - name: Show version
        if: matrix.run_version
        run: ./memf --version
